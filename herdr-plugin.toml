# herdr plugin: capture pane lifecycle events and feed them to the `herdr-status` command,
# which maintains per-pane activity status (icon via state_labels + a counting timer).
#
# This is the EVENT-CAPTURE half. herdr invokes the command below once per matching event,
# passing HERDR_PLUGIN_EVENT + HERDR_PLUGIN_EVENT_JSON (which carry pane_id + agent_status).
# The timer's between-event ticking is handled by the daemon that `herdr-status` manages
# (bootstrapped from the first event, so no external trigger is needed).
#
# The event command is RELATIVE: herdr runs plugin commands with the plugin directory as their
# working directory, so `bin/herdr-status` resolves inside the installed/linked plugin root on
# every machine — no absolute path or per-machine rendering. This manifest therefore lives at the
# repo root, alongside bin/, lib/, and scripts/, so the plugin root is the repo root.
#
# The helper CLIs (herdr-status, herdr-status-rename) are put on PATH by the event hook itself
# (it symlinks them into ~/.local/bin from the installed plugin root on first run) — NOT by a
# [[build]] step. Build steps run in herdr's temporary checkout, which is then moved to the final
# managed location, so any symlink a build step creates would dangle. The event hook runs from the
# stable installed root, so its links stay valid and re-heal on every reinstall.
#
# Install:  herdr plugin install <owner>/<repo>   (links appear once an agent is first detected)
# Develop:  herdr plugin link <this repo>          (run ./install.sh for the links up front)

id = "ot.claude-status"
name = "Claude Status"
version = "0.1.0"
min_herdr_version = "0.7.1"
description = "Per-pane activity status: icon via state_labels (herdr-swapped) + a counting timer."
platforms = ["macos", "linux"]

[[events]]
on = "pane.agent_detected"
command = ["bin/herdr-status", "__run", "event"]

[[events]]
on = "pane.agent_status_changed"
command = ["bin/herdr-status", "__run", "event"]
